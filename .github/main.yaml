  name: CI pipeline

  on: 
    push: 
      branches ['main']
    pull_request:
  
  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: checkout do código
          uses: actions/checkout@v4

        - name: Setup node
          uses: actions/setup-node@v4
          with:
          node-version: '20'

        - name: Install dependencies
          run: npm install

        - name: Rodar testes
          run: npm test
          